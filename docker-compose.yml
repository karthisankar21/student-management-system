version: "3.8"

services:

  student_db:
    image: mysql:8
    container_name: student_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_db
    ports:
      - "3307:3306"
    volumes:
      - student_data:/var/lib/mysql
      - ./db/studentdb_init.sql:/docker-entrypoint-initdb.d/student_init.sql


  auth_db:
    image: mysql:8
    container_name: auth_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3308:3306"
    volumes:
      - auth_data:/var/lib/mysql
      - ./db/authdb_init.sql:/docker-entrypoint-initdb.d/auth_init.sql

volumes:
  student_data:
  auth_data: