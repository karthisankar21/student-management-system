<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Register</h2>

<input id="name" class="form-control mb-2" placeholder="Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-success" onclick="register()">Register</button>
<a href="login.html" class="btn btn-secondary">Login</a>

<script>
// Register function to create new user
function register() {

    fetch("../login/login-api/register.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => res.json())
    .then(data => {

        alert(data.message);

        if (data.status === "success") {
            window.location.href = "login.html";
        }
    });
}

</script>

</body>
</html>
