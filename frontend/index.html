<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Login-Check -->
<script>
function checkLogin() {

    fetch("../api/check-login.php")
    .then(res => res.json())
    .then(data => {

        if (data.status !== "success") {

            window.location.href = "login.html";
        }
    });
}

// run only on dashboard
checkLogin();
</script>


<!-- Students Data -->
<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">

        <h4>Student App</h4>
        <hr>

        <p>📊 Dashboard</p>
        <p>👨‍🎓 Students</p>
        <p>⚙️ Settings</p>

    </div>

    <!-- MAIN CONTENT -->
    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="mb-0">Student Management Dashboard</h2>

            <button class="btn btn-danger" onclick="logout()">
                Logout
            </button>

        </div>


        <!-- STATS CARDS -->
        <div class="row mb-4">

            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <h5>Total Students</h5>
                    <h3 id="totalStudents">0</h3>
                </div>
            </div>
        </div>


        <!-- SEARCH -->
        <div class="input-group mb-3 shadow-sm">
            <span class="input-group-text">🔍</span>
            <input type="text" id="search" class="form-control"
                placeholder="Search students..."
                onkeyup="loadStudents()">
        </div>

        <!-- ADD BUTTON -->
        <button class="btn btn-primary mb-3" onclick="openModal()">
             Add Student
        </button>

        <!-- TABLE -->
        <table class="table table-hover shadow-sm">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="studentTable"></tbody>

        </table>

    </div>
</div>

<!-- MODAL -->
<div id="studentModal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.5);">

    <div class="bg-white p-4"
        style="width:400px; margin:100px auto; border-radius:10px;">

        <h4 id="modalTitle">Add Student</h4>

        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="course" class="form-control mb-2" placeholder="Course">

        <button class="btn btn-success" onclick="saveStudent()">
            Save
        </button>

        <button class="btn btn-secondary" onclick="closeModal()">
            Cancel
        </button>

    </div>

</div>

</body>


<script src="../assets/app.js"></script>

</html>
